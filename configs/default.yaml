dataset:
  slug: "luisandresgarcia/stock-market-prediction"
  raw_dir: "data/raw"
  extracted_dir: "data/raw/stock-market-prediction"
  processed_dir: "data/processed"
  interim_dir: "data/interim"
  archive_name: "stock-market-prediction.zip"
  schema_path: "data/interim/schema.json"
  prepared_filename: "prepared_stock_data.csv"

experiment:
  stock_symbols: []
  feature_columns: []
  feature_set: "auto"
  feature_groups:
    provided_technical_indicators: []
  target_column: "target_next_adjclose"
  price_column: "adjclose"
  date_column: "date"
  symbol_column: "symbol"
  prediction_horizon: 1
  prediction_horizons: [1, 5]
  prediction_cutoff: "close"
  window_size: 20
  window_sizes: [20, 60]
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  split_mode: "date"
  seed: 42
  output_dir: "outputs"
  generate_figures: true
  evaluation_modes:
    - "holdout"
    - "walk_forward"
  walk_forward_steps: 0
  walk_forward_models:
    - "linear_regression"
    - "linear_regression_scaled"
    - "arima"
    - "garch_return"
    - "lstm"
    - "gru"
    - "transformer"
    - "arima_residual_lstm"
  selected_models:
    - "linear_regression"
    - "linear_regression_scaled"
    - "arima"
    - "garch_return"
    - "lstm"
    - "gru"
    - "transformer"
    - "arima_residual_lstm"
  backtest_window_type: "expanding"
  early_stopping_patience: 5
  min_delta: 0.0001
  tune_arima_order: true
  extreme_volatility_quantile: 0.95
  winsorize_limits: [0.01, 0.99]

models:
  linear_regression: {}
  linear_regression_scaled: {}
  arima:
    order: [5, 1, 0]
    order_grid:
      - [1, 1, 0]
      - [2, 1, 0]
      - [3, 1, 0]
      - [5, 1, 0]
      - [2, 1, 2]
      - [3, 1, 3]
  garch_return:
    p: 1
    q: 1
    lags: 1
    mean: "ARX"
    dist: "normal"
    order_grid:
      - {p: 1, q: 1, lags: 1, mean: "ARX", dist: "normal"}
      - {p: 1, q: 2, lags: 1, mean: "ARX", dist: "normal"}
      - {p: 2, q: 1, lags: 1, mean: "ARX", dist: "normal"}
  lstm:
    hidden_size: 64
    num_layers: 1
    dropout: 0.0
    epochs: 20
    batch_size: 32
    learning_rate: 0.001
  gru:
    hidden_size: 64
    num_layers: 1
    dropout: 0.0
    epochs: 20
    batch_size: 32
    learning_rate: 0.001
  transformer:
    hidden_size: 64
    num_layers: 2
    dropout: 0.1
    epochs: 20
    batch_size: 32
    learning_rate: 0.001
  hybrid:
    arima_order: [5, 1, 0]
    hidden_size: 32
    num_layers: 1
    dropout: 0.0
    epochs: 20
    batch_size: 32
    learning_rate: 0.001
