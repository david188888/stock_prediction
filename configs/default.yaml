dataset:
  slug: "luisandresgarcia/stock-market-prediction"
  raw_dir: "data/raw"
  extracted_dir: "data/raw/stock-market-prediction"
  processed_dir: "data/processed"
  interim_dir: "data/interim"
  archive_name: "stock-market-prediction.zip"
  schema_path: "data/interim/schema.json"
  prepared_filename: "prepared_stock_data.csv"

experiment:
  stock_symbols: []
  feature_columns: []
  feature_set: "auto"
  target_column: "target_next_close"
  date_column: "date"
  symbol_column: "symbol"
  window_size: 20
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  output_dir: "outputs"
  generate_figures: true
  evaluation_modes:
    - "holdout"
    - "walk_forward"
  walk_forward_steps: 20
  walk_forward_models:
    - "linear_regression"
    - "linear_regression_scaled"
    - "arima"
    - "lstm"
    - "gru"
    - "arima_residual_lstm"
  early_stopping_patience: 5
  min_delta: 0.0001
  tune_arima_order: true

models:
  linear_regression: {}
  linear_regression_scaled: {}
  arima:
    order: [5, 1, 0]
    order_grid:
      - [1, 1, 0]
      - [2, 1, 0]
      - [3, 1, 0]
      - [5, 1, 0]
      - [2, 1, 2]
      - [3, 1, 3]
  lstm:
    hidden_size: 64
    num_layers: 1
    dropout: 0.0
    epochs: 20
    batch_size: 32
    learning_rate: 0.001
  gru:
    hidden_size: 64
    num_layers: 1
    dropout: 0.0
    epochs: 20
    batch_size: 32
    learning_rate: 0.001
  hybrid:
    arima_order: [5, 1, 0]
    hidden_size: 32
    num_layers: 1
    dropout: 0.0
    epochs: 20
    batch_size: 32
    learning_rate: 0.001
