dataset:
  slug: "luisandresgarcia/stock-market-prediction"
  raw_dir: "data/raw"
  extracted_dir: "data/raw/stock-market-prediction"
  processed_dir: "data/processed"
  interim_dir: "data/interim"
  archive_name: "stock-market-prediction.zip"
  schema_path: "data/interim/schema.json"
  prepared_filename: "prepared_stock_data.csv"

experiment:
  stock_symbols: []
  feature_columns:
    - "open"
    - "high"
    - "low"
    - "close"
    - "volume"
  target_column: "close"
  date_column: "date"
  symbol_column: "symbol"
  window_size: 20
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42
  output_dir: "outputs"
  generate_figures: true
  walk_forward_steps: 20

models:
  linear_regression: {}
  arima:
    order: [5, 1, 0]
  lstm:
    hidden_size: 64
    num_layers: 1
    dropout: 0.0
    epochs: 20
    batch_size: 32
    learning_rate: 0.001
  gru:
    hidden_size: 64
    num_layers: 1
    dropout: 0.0
    epochs: 20
    batch_size: 32
    learning_rate: 0.001
  hybrid:
    arima_order: [5, 1, 0]
    hidden_size: 32
    num_layers: 1
    dropout: 0.0
    epochs: 20
    batch_size: 32
    learning_rate: 0.001

